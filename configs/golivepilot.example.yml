###############################################
# GoLivePilot example config
#
# Non-secret structure lives here.
# Secrets live in environment variables / .env / Docker secrets.
###############################################

app:
  name: "GoLivePilot"
  listen: ":3000"
  public_base_url: "https://stream.example.com"
  data_dir: "/data"

  # UI mode:
  #   simple   = minimal operator UX
  #   advanced = expose logs/config/details
  ui_mode: "simple"

logging:
  # Log level: debug | info | warn | error
  level: "info"
  # Log format: text | json
  format: "text"

###############################################
# Operator authentication
###############################################

auth:
  # v0.1 recommended:
  #   psk_cookie = user enters PSK once, server sets HttpOnly cookie.
  #
  #   bearer_token = static token via Authorization header (for automation/testing).
  #
  # Avoid keeping tokens in browser localStorage.
  mode: "psk_cookie"

  # Env var containing operator PSK.
  psk_env: "GOLIVEPILOT_OPERATOR_PSK"

  # Optional one-shot token login:
  #   https://stream.example.com/token-login?t=...
  # Server should validate and redirect to / without token in URL.
  allow_token_login_url: true

  cookie:
    name: "golivepilot_session"
    secure: true
    same_site: "Lax"
    ttl: "12h"

###############################################
# TLS for GoLivePilot UI/API
###############################################

tls:
  # Recommended v0.1:
  #   false, terminate HTTPS at Caddy/Nginx.
  enabled: false

  # If enabled, GoLivePilot serves HTTPS directly.
  cert_file: "/etc/letsencrypt/live/stream.example.com/fullchain.pem"
  key_file: "/etc/letsencrypt/live/stream.example.com/privkey.pem"

###############################################
# Media engine
###############################################

media_engine:
  # v0.1 recommended:
  #   mediamtx = MediaMTX handles browser/RTMPS/WebRTC/HLS source routing.
  #
  # Future:
  #   ffmpeg-listen
  #   websocket
  #   none
  type: "mediamtx"

  mediamtx:
    api_url: "http://mediamtx:9997"

    # Used to build internal source URLs if ingest.internal_source_url is omitted.
    internal_rtmp_base: "rtmp://mediamtx:1935"

    # HLS base URL exposed to the operator UI.
    # Usually routed through Caddy/GoLivePilot in production.
    hls_base_url: "https://stream.example.com/hls"

###############################################
# Operator UX
###############################################

ui:
  title: "GoLivePilot"
  subtitle: "Preview → Go Live → Stop"
  preview_hls_url: "http://127.0.0.1:8888/live/program/index.m3u8"
  camera_source_url: "rtmp://127.0.0.1:1935/live/camera"
  show_logs: true
  show_config_validation: true

program:
  publish_url: "rtmp://mediamtx:1935/live/program"
  source_url: "rtmp://mediamtx:1935/live/program"
  hls_url: "https://stream.example.com/hls/live/program/index.m3u8"
  camera_source_url: "rtmp://mediamtx:1935/live/camera"

  # Keep mobile UX simple.
  mobile:
    prefer_landscape: true
    show_keep_awake_warning: true
    show_network_warning: true

  buttons:
    preview_label: "Preview"
    go_live_label: "Go Live"
    stop_label: "Stop"

###############################################
# Ingests
###############################################

ingests:
  - id: "camera"
    label: "Browser Camera"
    type: "webrtc"
    path: "live/camera"
    enabled: true

    # Displayed in UI for diagnostics.
    # Actual WebRTC publish URL may be generated by the frontend/API.
    public_publish_url: "https://stream.example.com/webrtc/live/camera"

    # Internal URL that FFmpeg workers read.
    # For MediaMTX, this is usually RTMP internally.
    internal_source_url: "rtmp://mediamtx:1935/live/camera"

    preview:
      type: "hls"
      url: "https://stream.example.com/hls/live/camera/index.m3u8"

    browser_capture:
      enabled: true
      video:
        width: 1280
        height: 720
        frame_rate: 30
        facing_mode: "environment"   # user | environment
      audio:
        enabled: true
        echo_cancellation: true
        noise_suppression: true
        auto_gain_control: true

  - id: "rtmps-iphone"
    label: "External RTMPS Input"
    type: "rtmps"
    path: "live/iphone"
    enabled: false

    public_publish_url: "rtmps://stream.example.com:1936/live/iphone"
    publish_user: "golivepilot-publish"
    publish_pass_env: "GOLIVEPILOT_PUBLISH_PASS"

    internal_source_url: "rtmp://mediamtx:1935/live/iphone"

    preview:
      type: "hls"
      url: "https://stream.example.com/hls/live/iphone/index.m3u8"

###############################################
# Slate / preview source
###############################################

slate:
  enabled: true

  # Static image or looped video shown before the camera goes live.
  # Mount this file into the container.
  type: "image" # image | video
  path: "/assets/starting-soon.png"

  standby_image: "/assets/standing-by.png"
  starting_image: "/assets/starting-soon.png"
  ended_image: "/assets/stream-ended.png"

  # Text may be used later to auto-generate the slate.
  text: "Stream is starting soon"

  video:
    width: 1280
    height: 720
    frame_rate: 30
    bitrate: "2500k"
    keyframe_interval: 60

  audio:
    enabled: true
    type: "silent"
    sample_rate: 48000
    channels: 2
    bitrate: "128k"

###############################################
# FFmpeg
###############################################

ffmpeg:
  binary: "ffmpeg"
  log_level: "info"

  # Kill behavior for stopped/restarted relays.
  stop:
    signal: "SIGINT"
    graceful_timeout: "5s"
    force_signal: "SIGKILL"

  reconnect:
    enabled: true
    initial_delay: "2s"
    max_delay: "30s"
    max_attempts: 0        # 0 = forever while source/session active

###############################################
# Output profiles
###############################################

profiles:
  - id: "copy"
    label: "Copy audio/video"
    description: "Lowest CPU; use when source is already H.264/AAC-compatible."
    args:
      - "-fflags"
      - "+genpts"
      - "-c"
      - "copy"
      - "-avoid_negative_ts"
      - "make_zero"
      - "-flvflags"
      - "no_duration_filesize"

  - id: "copy-video-aac-audio"
    label: "Copy video, AAC audio"
    description: "Good default for browser/WebRTC sources if video is H.264 but audio needs AAC."
    args:
      - "-fflags"
      - "+genpts"
      - "-c:v"
      - "copy"
      - "-c:a"
      - "aac"
      - "-b:a"
      - "128k"
      - "-ar"
      - "48000"
      - "-avoid_negative_ts"
      - "make_zero"
      - "-flvflags"
      - "no_duration_filesize"

  - id: "x264-720p"
    label: "Transcode 720p H.264/AAC"
    description: "Most compatible; higher CPU."
    args:
      - "-fflags"
      - "+genpts"
      - "-c:v"
      - "libx264"
      - "-preset"
      - "veryfast"
      - "-tune"
      - "zerolatency"
      - "-pix_fmt"
      - "yuv420p"
      - "-b:v"
      - "3000k"
      - "-maxrate"
      - "3000k"
      - "-bufsize"
      - "6000k"
      - "-g"
      - "60"
      - "-c:a"
      - "aac"
      - "-b:a"
      - "128k"
      - "-ar"
      - "48000"
      - "-avoid_negative_ts"
      - "make_zero"
      - "-flvflags"
      - "no_duration_filesize"

###############################################
# Targets
###############################################

targets:
  - id: "__preview__"
    label: "Browser Preview"
    platform: "local"
    enabled: true
    preview_source: "slate"
    live_source: "camera"
    profile_id: "x264-720p"
    rtmps_url_env: "LOCAL_PREVIEW_RTMP_URL"

  - id: "facebook-main"
    label: "Facebook"
    platform: "facebook"
    enabled: true

    # Primary live ingest.
    ingest_id: "camera"

    # Source used for Preview phase.
    preview_source: "slate"

    # Source used for Go Live phase.
    live_source: "camera"

    profile_id: "x264-720p"

    # RTMPS destination URL.
    # Example value:
    #   rtmps://live-api-s.facebook.com:443/rtmp/<key>
    rtmps_url_env: "FB_RTMPS_URL"

    # Facebook Stream Key (optional if included in URL, but recommended to separate)
    rtmps_key_env: "FB_RTMPS_KEY"

    lifecycle:
      supports_preview: true
      supports_go_live: true
      supports_end: true

      # v0.1 behavior:
      #   start slate relay first
      #   switch to camera before public live transition
      #   then call go-live API
      switch_to_camera_before_go_live: true

      # Prevent duplicate FFmpeg publishers for same target/key.
      single_writer: true

    control:
      live_video_id_env: "FB_LIVE_VIDEO_ID"
      page_access_token_env: "FB_PAGE_ACCESS_TOKEN"

      # Future event creation support.
      auto_create_event: false
      page_id_env: "FB_PAGE_ID"
      title: "Live Stream"
      description: "Live stream via GoLivePilot"

    reconnect:
      enabled: true
      initial_delay: "2s"
      max_delay: "30s"
      max_attempts: 0

  - id: "youtube-main"
    label: "YouTube"
    platform: "youtube"
    enabled: true

    ingest_id: "camera"
    preview_source: "slate"
    live_source: "camera"

    profile_id: "x264-720p"

    # RTMPS destination URL.
    rtmps_url_env: "YT_RTMPS_URL"

    # YouTube Stream Key
    rtmps_key_env: "YT_RTMPS_KEY"

    lifecycle:
      supports_preview: true
      supports_go_live: true
      supports_end: true
      switch_to_camera_before_go_live: true
      single_writer: true

    control:
      broadcast_id_env: "YT_BROADCAST_ID"

      # For v0.1 this may be manually supplied.
      # Later use refresh_token/client_id/client_secret to refresh automatically.
      access_token_env: "YT_ACCESS_TOKEN"

      refresh_token_env: "YT_REFRESH_TOKEN"
      client_id_env: "YT_CLIENT_ID"
      client_secret_env: "YT_CLIENT_SECRET"

      auto_create_event: false
      title: "Live Stream"
      description: "Live stream via GoLivePilot"
      privacy_status: "unlisted" # public | unlisted | private

    reconnect:
      enabled: true
      initial_delay: "2s"
      max_delay: "30s"
      max_attempts: 0

  - id: "custom-rtmps"
    label: "Custom RTMPS"
    platform: "custom-rtmps"
    enabled: false

    ingest_id: "camera"
    preview_source: "slate"
    live_source: "camera"

    profile_id: "x264-720p"
    rtmps_url_env: "CUSTOM_RTMPS_URL"
    rtmps_key_env: "CUSTOM_RTMPS_KEY"

    lifecycle:
      supports_preview: false
      supports_go_live: false
      supports_end: false
      single_writer: true

###############################################
# Runtime state
###############################################

runtime:
  store:
    # Recommended v0.1:
    #   bbolt = simple embedded persistent state.
    #
    # Alternatives:
    #   json
    #   sqlite
    type: "bbolt"
    path: "/data/golivepilot.db"

  logs:
    retain_lines_per_relay: 500
    retain_events: 1000

###############################################
# Safety / operational behavior
###############################################

behavior:
  # Do not automatically go live just because the source appears.
  auto_go_live: false

  # Preview starts slate output to platforms.
  preview_starts_slate: true

  # Go Live switches to camera, waits for relay stability, then calls platform APIs.
  go_live_requires_camera_ready: true
  go_live_stability_delay: "5s"

  # Stop ends platforms first, then stops workers.
  stop_order: "end-platforms-then-stop-relays"

  # If target drops while live, restart according to target reconnect policy.
  reconnect_targets_while_live: true

  # If source drops while live, keep retrying target source read until stop.
  source_loss_policy: "retry" # retry | stop | slate